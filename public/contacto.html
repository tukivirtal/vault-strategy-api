<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto | Vault Logic</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .form-container { background: rgba(255,255,255,0.05); padding: 40px; border: 1px solid rgba(212,175,55,0.2); border-radius: 10px; width: 100%; max-width: 400px; }
        h1 { color: #D4AF37; text-transform: uppercase; letter-spacing: 0.1em; font-size: 24px; text-align: center; margin-bottom: 30px; }
        input, textarea { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 15px; margin-bottom: 20px; border-radius: 5px; box-sizing: border-box; font-family: monospace; }
        input:focus, textarea:focus { outline: none; border-color: #D4AF37; }
        button { width: 100%; background: #D4AF37; color: #000; padding: 15px; border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; border-radius: 5px; letter-spacing: 0.1em; }
        button:hover { background: #FFF5D1; }
        a { color: #888; text-decoration: none; margin-top: 20px; display: block; text-align: center; font-size: 12px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Soporte Ejecutivo</h1>
        <form action="#" method="POST">
            <input type="email" placeholder="SU CORREO CORPORATIVO" required>
            <textarea rows="4" placeholder="MENSAJE / SOLICITUD DE ACCESO" required></textarea>
            <button type="submit">Enviar Directiva</button>
        </form>
        <a href="/">Volver a la Terminal</a>
    </div>
</body>
</html>
