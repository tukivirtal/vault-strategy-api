<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vault Logic | Terminal Free</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ESTILOS PREMIUM (MODERNIZADOS) */
        :root { --gold: #d4af37; --dark: #000; }
        body { 
            background: var(--dark); color: #fff; font-family: 'Inter', sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden;
        }
        
        /* Efectos de Fondo */
        .noise-overlay { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.04; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); }
        .glow-bg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 800px; height: 800px; background: rgba(212, 175, 55, 0.03); filter: blur(150px); border-radius: 50%; z-index: 0; pointer-events: none; }

        /* Navegación */
        nav { width: 100%; padding: 25px 50px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 10; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(12px); }
        .logo { font-weight: 900; font-size: 18px; letter-spacing: 0.1em; display: flex; align-items: center; gap: 10px; }
        .logo-icon { color: var(--gold); }
        .btn-logout { background: transparent; color: #ff4d4d; border: 1px solid rgba(255,77,77,0.3); padding: 8px 16px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .btn-logout:hover { background: rgba(255,77,77,0.1); }

        #loading-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 80vh; width: 100%; text-align: center; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.2em; z-index: 10; position: relative;}
        
        /* Contenedor Principal (Glassmorphism) */
        .report-container { 
            background: rgba(15,15,15,0.6); backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.15); border-radius: 8px;
            padding: 40px; max-width: 1000px; width: 90%; display: none; margin: 40px 0;
            position: relative; z-index: 10; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        
        .header-box { border-left: 4px solid var(--gold); padding-left: 20px; margin-bottom: 40px; }
        .mono-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #888; letter-spacing: 0.2em; text-transform: uppercase; }
        .value { font-size: 2.5rem; color: #fff; font-weight: 300; text-transform: uppercase; margin: 5px 0; letter-spacing: -0.02em; }
        #datos-origen { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--gold); margin-top: 10px; letter-spacing: 0.1em; }
        
        .vault-layout { display: grid; grid-template-columns: 200px 1fr 200px; gap: 30px; align-items: center; }
        
        .sidebar { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); padding: 20px; border-radius: 6px; }
        .sidebar-title { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--gold); letter-spacing: 0.1em; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; display: block; }
        .list-item { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #aaa; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .list-item b { color: #fff; }
        
        #canvas-container { width: 100%; aspect-ratio: 1; border-radius: 50%; border: 1px solid rgba(212, 175, 55, 0.1); display: flex; align-items: center; justify-content: center; position: relative; background: radial-gradient(circle, rgba(212,175,55,0.02) 0%, transparent 70%); }
        
        .directiva { background: rgba(212,175,55,0.05); padding: 25px; border-left: 4px solid var(--gold); color: #ccc; margin-top: 40px; font-size: 14px; line-height: 1.6; border-radius: 0 4px 4px 0; }
        .directiva b { color: var(--gold); font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.1em; display: block; margin-bottom: 5px;}
        
        .btn-nasa { background: var(--gold); color: #000; border: none; padding: 20px; width: 100%; font-weight: bold; font-family: 'JetBrains Mono', monospace; font-size: 12px; cursor: pointer; margin-top: 30px; letter-spacing: 0.2em; text-transform: uppercase; transition: 0.3s; border-radius: 4px; }
        .btn-nasa:hover { background: #FFF5D1; box-shadow: 0 0 20px rgba(212,175,55,0.3); transform: translateY(-2px); }

        footer { width: 100%; padding: 40px 0; background: rgba(0,0,0,0.8); border-top: 1px solid rgba(255,255,255,0.05); text-align: center; margin-top: auto; display: none; position: relative; z-index: 10; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em;}
        footer a { color: #666; text-decoration: none; margin: 0 15px; transition: 0.3s; }
        footer a:hover { color: var(--gold); }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>
    <div class="glow-bg"></div>

    <nav>
        <div class="logo">
            <span class="logo-icon">●</span> VAULT LOGIC <span style="font-weight: 300; opacity: 0.5;">| TERMINAL</span>
        </div>
        <button onclick="cerrarSesion()" class="btn-logout">CERRAR SESIÓN</button>
    </nav>

    <div id="loading-screen">SINCRO NÚCLEO...</div>

    <div class="report-container" id="reporte">
        <div class="header-box">
            <span class="mono-sub">SUJETO DE ANÁLISIS</span>
            <div class="value" id="nombre">---</div>
            <div id="datos-origen">---</div>
        </div>

        <div class="vault-layout">
            <div class="sidebar">
                <span class="sidebar-title">VECTORES NATALES</span>
                <div id="listado-planetas"></div>
            </div>

            <div id="canvas-container"></div>

            <div class="sidebar">
                <span class="sidebar-title">SISTEMA STATUS</span>
                <div class="list-item">CONEXIÓN <b>ESTABLE</b></div>
                <div class="list-item">AUTH <b id="auth-status" style="color:var(--gold)">---</b></div>
                <div class="list-item">GEO <b id="geo-display">---</b></div>
            </div>
        </div>

        <div class="directiva" id="directiva">---</div>
        <button class="btn-nasa" id="btn-action">UPGRADE: ACCEDER A SUSCRIPCIÓN</button>
    </div>

    <footer id="main-footer">
        <a href="privacidad.html">PRIVACIDAD</a>
        <a href="terminos.html">TÉRMINOS</a>
        <span style="color: #444; margin-left: 20px;">© 2026 EXECUTIVE INTELLIGENCE</span>
    </footer>

<script>
function cerrarSesion() {
    localStorage.removeItem('vault_user_email');
    localStorage.removeItem('vault_user_nombre');
    window.location.href = 'portal.html';
}

function generarHashUsuario(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) { hash = str.charCodeAt(i) + ((hash << 5) - hash); }
    return Math.abs(hash);
}

async function conectar() {
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get('email') || localStorage.getItem('vault_user_email');
    
    if (!email) { window.location.href = 'portal.html'; return; }

    try {
        const response = await fetch("https://vault-strategy-api.onrender.com/obtener_perfil", {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email: email })
        });
        const res = await response.json();

        if (res.status === "success" && res.datos) {
            const d = res.datos;
            const nivelSuscripcion = (d.nivel_suscripcion || "FREE").toUpperCase();

            if (nivelSuscripcion.includes("GENESIS")) { window.location.href = `genesis-live.html?email=${encodeURIComponent(email)}`; return; } 
            else if (nivelSuscripcion === "SENTINEL") { window.location.href = `sentinel.html?email=${encodeURIComponent(email)}`; return; } 
            else if (nivelSuscripcion === "EXECUTIVE") { window.location.href = `executive.html?email=${encodeURIComponent(email)}`; return; }

            document.getElementById('nombre').innerText = (d.nombre || email.split('@')[0]).toUpperCase();
            
            let fecha = "PENDIENTE", hora = "--:--", lugar = "Sincronización Incompleta";
            let lat = 43.45, lon = -80.00;

            let datosNatalesObj = d.datos_natales;
            if (typeof datosNatalesObj === 'string') { try { datosNatalesObj = JSON.parse(datosNatalesObj); } catch(e) {} }

            if (datosNatalesObj) {
                if (datosNatalesObj.fecha) fecha = datosNatalesObj.fecha;
                if (datosNatalesObj.hora) hora = datosNatalesObj.hora;
                if (datosNatalesObj.lugar_original) lugar = datosNatalesObj.lugar_original.toUpperCase();
                if (datosNatalesObj.lat) lat = parseFloat(datosNatalesObj.lat);
                if (datosNatalesObj.lon) lon = parseFloat(datosNatalesObj.lon);
            }

            document.getElementById('datos-origen').innerText = `${fecha} // ${hora} // ${lugar}`;
            document.getElementById('auth-status').innerText = nivelSuscripcion;
            document.getElementById('geo-display').innerText = `LAT: ${lat.toFixed(2)}`;

            document.getElementById('directiva').innerHTML = "<b>DIRECTIVA IA</b> Los vectores de sincronización iniciales indican un potencial no explotado. Para un análisis detallado de volatilidades y oportunidades corporativas, proceda al upgrade.";

            const btn = document.getElementById('btn-action');
            btn.onclick = () => { window.location.href = `suscripcion.html?email=${encodeURIComponent(email)}`; };

            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('reporte').style.display = 'block';
            document.getElementById('main-footer').style.display = 'block';
            
            const seed = generarHashUsuario(email);
            const vectores = { "SOL": (seed % 360), "LUNA": ((seed * 2) % 360), "MARTE": ((seed * 3) % 360), "VENUS": ((seed * 5) % 360), "JUPITER": ((seed * 7) % 360), "SATURNO": ((seed * 11) % 360), "MERCURIO": ((seed * 13) % 360) };
            
            dibujar(vectores);
            llenarListado(vectores);

        } else {
            document.getElementById('loading-screen').innerHTML = "<div style='color:#ff4d4d;'>DATOS NO ENCONTRADOS</div><br><button onclick='cerrarSesion()' style='background:#d4af37;color:#000;padding:10px 20px;cursor:pointer; font-family:inherit;'>VOLVER AL INICIO</button>";
        }
    } catch (e) { 
        document.getElementById('loading-screen').innerHTML = "<div style='color:#ff4d4d;'>ERROR DE CONEXIÓN</div><br><button onclick='cerrarSesion()' style='background:#d4af37;color:#000;padding:10px 20px;cursor:pointer; font-family:inherit;'>VOLVER</button>";
    }
}

function llenarListado(vectores) {
    const lista = document.getElementById('listado-planetas');
    lista.innerHTML = '';
    Object.entries(vectores).forEach(([nom, grad]) => {
        lista.innerHTML += `<div class="list-item">${nom} <b>${Math.floor(grad)}°</b></div>`;
    });
}

function dibujar(vectores) {
    let svg = `<svg viewBox="0 0 380 380" style="width:100%; height:100%;"><circle cx="190" cy="190" r="145" fill="none" stroke="rgba(212,175,55,0.15)" stroke-dasharray="4 4" />`;
    Object.entries(vectores).forEach(([nom, grad]) => {
        const rad = (grad - 90) * Math.PI / 180;
        const x = 190 + 145 * Math.cos(rad); const y = 190 + 145 * Math.sin(rad);
        svg += `<line x1="190" y1="190" x2="${x}" y2="${y}" stroke="rgba(212,175,55,0.3)" stroke-width="1" /><circle cx="${x}" cy="${y}" r="4" fill="#fff" box-shadow="0 0 10px #fff"/><text x="${x+8}" y="${y+4}" fill="#d4af37" font-size="9" font-family="monospace" font-weight="bold">${nom}</text>`;
    });
    document.getElementById('canvas-container').innerHTML = svg + `</svg>`;
}
window.onload = conectar;
</script>
</body>
</html>
