<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vault Logic | Executive Bóveda</title>
    <style>
        :root { --gold: #d4af37; --dark: #050505; --alert: #ff4d4d; }
        body { background: var(--dark); color: var(--gold); font-family: 'JetBrains Mono', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #loading-screen { text-align: center; }
        .report-container { background: rgba(10, 10, 10, 0.98); border: 1px solid rgba(212, 175, 55, 0.2); padding: 50px; max-width: 900px; width: 100%; display: none; }
        h1 { letter-spacing: 0.6em; font-size: 1.1rem; text-align: center; border-bottom: 1px solid #222; padding-bottom: 20px; }
        .value { font-size: 2.6rem; color: #fff; font-weight: 600; text-transform: uppercase; }
        #canvas-container { width: 380px; height: 380px; border: 1px solid #111; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 20px auto; }
        .btn-nasa { background: var(--gold); color: #000; border: none; padding: 20px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 20px; outline: 1px solid var(--gold); outline-offset: 3px; }
        .error-btn { background: transparent; color: var(--alert); border: 1px solid var(--alert); padding: 10px; cursor: pointer; margin-top: 15px; font-family: inherit; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div style="letter-spacing: 0.5em; font-size: 1.2rem;">SINCRONIZANDO NÚCLEO...</div>
    <div id="status-msg" style="font-size: 0.7rem; color: #555; margin-top: 10px;">Estableciendo protocolo de enlace con NASA/JPL...</div>
    <div id="retry-area"></div>
</div>

<div class="report-container" id="reporte">
    <h1>VAULT LOGIC // EXECUTIVE TERMINAL</h1>
    <div style="border-left: 4px solid var(--gold); padding-left: 20px; margin: 30px 0;">
        <span style="font-size: 0.7rem; color: #555;">SUJETO DE ANÁLISIS</span>
        <div class="value" id="nombre">---</div>
    </div>
    
    <div id="canvas-container"></div>
    
    <div id="directiva" style="background: rgba(212,175,55,0.03); padding: 25px; border-left: 5px solid var(--gold); color: #fff; font-size: 1.1rem; line-height: 1.6;">---</div>
    
    <button class="btn-nasa" onclick="location.href='suscripcion.html'">ACTIVAR CENTRO DE COMANDO GÉNESIS</button>
</div>

<script>
async function conectarNucleo() {
    const email = new URLSearchParams(window.location.search).get('email');
    const status = document.getElementById('status-msg');
    const retryArea = document.getElementById('retry-area');
    
    if (!email) { status.innerText = "ERROR: CREDENCIALES NO DETECTADAS"; return; }

    try {
        const response = await fetch(`https://vault-strategy-api.onrender.com/obtener_reporte/${encodeURIComponent(email)}`);
        const res = await response.json();

        if (res.status === "success" && res.data?.mapatotal?.vectores_eclipticos) {
            document.getElementById('nombre').innerText = res.data.nombre.toUpperCase();
            document.getElementById('directiva').innerText = res.data.directiva;
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('reporte').style.display = 'block';
            dibujarRadar(res.data.mapatotal.vectores_eclipticos);
        } else {
            status.innerText = "NÚCLEO EN CÁLCULO... ESPERE.";
            retryArea.innerHTML = `<button class="error-btn" onclick="conectarNucleo()">RE-VINCULAR MANUALMENTE</button>`;
            setTimeout(conectarNucleo, 4000);
        }
    } catch (e) {
        status.innerText = "ERROR DE CONEXIÓN (CORS/NETWORK)";
        retryArea.innerHTML = `<button class="error-btn" onclick="conectarNucleo()">REINTENTAR CONEXIÓN</button>`;
    }
}

function dibujarRadar(vectores) {
    const centro = 190; const radio = 145;
    let svg = `<svg viewBox="0 0 380 380" style="width:100%; height:100%;">
        <circle cx="190" cy="190" r="145" fill="none" stroke="rgba(212,175,55,0.2)" stroke-width="1" />
        <line x1="190" y1="45" x2="190" y2="335" stroke="rgba(212,175,55,0.05)" />
        <line x1="45" y1="190" x2="335" y2="190" stroke="rgba(212,175,55,0.05)" />`;

    Object.entries(vectores).forEach(([nom, grad]) => {
        const x = centro + radio * Math.cos((grad - 90) * Math.PI / 180);
        const y = centro + radio * Math.sin((grad - 90) * Math.PI / 180);
        svg += `<line x1="190" y1="190" x2="${x}" y2="${y}" stroke="rgba(212,175,55,0.3)" stroke-width="0.5" />
                <circle cx="${x}" cy="${y}" r="5" fill="#fff" />
                <text x="${x + 12}" y="${y + 4}" fill="#d4af37" font-size="10" font-weight="bold">${nom.toUpperCase()}</text>`;
    });
    document.getElementById('canvas-container').innerHTML = svg + `</svg>`;
}
window.onload = conectarNucleo;
</script>
</body>
</html>
