<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vault Logic | Executive Bóveda</title>
    <style>
        :root { --gold: #d4af37; --alert: #ff4d4d; --safe: #00ff88; --dark: #050505; }
        body { background: var(--dark); color: var(--gold); font-family: 'JetBrains Mono', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #loading-screen { text-align: center; }
        .report-container { background: rgba(10, 10, 10, 0.98); border: 1px solid rgba(212, 175, 55, 0.2); padding: 50px; max-width: 900px; width: 100%; display: none; box-shadow: 0 0 100px #000; }
        h1 { letter-spacing: 0.6em; font-size: 1.1rem; text-align: center; border-bottom: 1px solid #222; padding-bottom: 20px; font-weight: 300; }
        .data-row { margin: 40px 0; border-left: 4px solid var(--gold); padding-left: 35px; }
        .value { font-size: 2.6rem; color: #fff; font-weight: 600; text-transform: uppercase; }
        
        /* Estructura de Radar con información lateral */
        .wheel-section { display: flex; align-items: center; justify-content: space-around; margin: 40px 0; gap: 20px; }
        #canvas-container { width: 380px; height: 380px; border: 1px solid #111; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(212,175,55,0.02); position: relative; }
        
        .side-info { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 0.1em; line-height: 1.5; }
        .side-info b { color: #fff; display: block; font-size: 0.9rem; }

        .directiva { background: rgba(212,175,55,0.03); padding: 25px; border-left: 5px solid var(--gold); color: #fff; font-size: 1.1rem; line-height: 1.6; margin-bottom: 20px; }
        .btn-nasa { background: var(--gold); color: #000; border: none; padding: 20px; width: 100%; font-weight: bold; letter-spacing: 0.3em; cursor: pointer; text-transform: uppercase; margin-top: 30px; outline: 1px solid var(--gold); outline-offset: 3px; }
        
        .loader-bar { width: 200px; height: 2px; background: #111; margin: 20px auto; position: relative; overflow: hidden; }
        .loader-bar::after { content: ""; position: absolute; width: 50px; height: 100%; background: var(--gold); animation: slide 1.5s infinite linear; }
        @keyframes slide { from { left: -50px; } to { left: 200px; } }
    </style>
</head>
<body>

<div id="loading-screen">
    <div style="letter-spacing: 0.5em; font-size: 1.2rem;">CALIBRANDO NÚCLEO...</div>
    <div class="loader-bar"></div>
    <div id="status-msg" style="font-size: 0.7rem; color: #555;">Sincronizando con NASA JPL DE441...</div>
    <div id="debug-info" style="font-size: 0.6rem; color: #333; margin-top: 20px;"></div>
</div>

<div class="report-container" id="reporte">
    <h1>VAULT LOGIC // EXECUTIVE TERMINAL</h1>
    
    <div class="data-row">
        <span style="font-size: 0.7rem; color: #555;">SUJETO DE ANÁLISIS</span>
        <div class="value" id="nombre">---</div>
    </div>

    <div class="wheel-section">
        <div class="side-info" style="text-align: right;">
            NODOS ACTIVOS<br><b id="nodos-count">10/10 [SECURE]</b>
        </div>

        <div id="canvas-container"></div>

        <div class="side-info" style="text-align: left;">
            VECTORES TENSIÓN<br><b id="tension-label" style="color: var(--safe);">CALCULANDO...</b>
        </div>
    </div>

    <div class="directiva" id="directiva">---</div>
    
    <button class="btn-nasa" id="btn-next">ACTIVAR CENTRO DE COMANDO GÉNESIS</button>
</div>

<script>
async function conectarNucleo() {
    const urlParams = new URLSearchParams(window.location.search);
    let email = urlParams.get('email');
    const status = document.getElementById('status-msg');
    const debug = document.getElementById('debug-info');
    
    if (!email) { status.innerText = "ERROR: NO SE DETECTÓ EMAIL EN LA URL"; return; }

    try {
        debug.innerText = `Buscando enlace para: ${email}...`;
        const response = await fetch(`https://vault-strategy-api.onrender.com/obtener_reporte/${encodeURIComponent(email)}`);
        
        if (!response.ok) {
            debug.innerText = `Error de conexión: ${response.status}`;
            setTimeout(conectarNucleo, 3000);
            return;
        }

        const res = await response.json();

        if (res.status === "success" && res.data) {
            document.getElementById('nombre').innerText = res.data.nombre.toUpperCase();
            document.getElementById('directiva').innerText = res.data.directiva;
            
            if (res.data.mapatotal && res.data.mapatotal.vectores_eclipticos) {
                dibujarRadar(res.data.mapatotal.vectores_eclipticos, res.data.mapatotal.analisis_kepler || []);
            } else {
                dibujarRadar({"NÚCLEO": 0, "DATOS": 120, "SYNC": 240}, []);
                debug.innerText = "Nota: Visualización en modo preventivo.";
            }

            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('reporte').style.display = 'block';

            // CORRECCIÓN: Apuntando a genesis-live.html
            document.getElementById('btn-next').onclick = () => {
                window.location.href = `genesis-live.html?email=${encodeURIComponent(email)}&nombre=${encodeURIComponent(res.data.nombre)}`;
            };
        } else {
            status.innerText = "DATOS EN COLA DE PROCESAMIENTO... REINTENTANDO.";
            setTimeout(conectarNucleo, 2000);
        }
    } catch (e) {
        status.innerText = "NÚCLEO OCUPADO... RECONECTANDO.";
        debug.innerText = e.message;
        setTimeout(conectarNucleo, 4000);
    }
}

function dibujarRadar(vectores, aspectos) {
    const centro = 190; const radio = 145;
    const tensionLabel = document.getElementById('tension-label');
    
    let svg = `<svg viewBox="0 0 380 380" style="width:100%; height:100%;">
        <circle cx="190" cy="190" r="145" fill="none" stroke="rgba(212,175,55,0.15)" stroke-width="1" />
        <line x1="190" y1="45" x2="190" y2="335" stroke="rgba(212,175,55,0.05)" />
        <line x1="45" y1="190" x2="335" y2="190" stroke="rgba(212,175,55,0.05)" />`;

    // Dibujar Aspectos (Líneas internas)
    if (aspectos && aspectos.length > 0) {
        aspectos.forEach(asp => {
            const p1 = vectores[asp.puntos.split('-')[0]];
            const p2 = vectores[asp.puntos.split('-')[1]];
            if (p1 !== undefined && p2 !== undefined) {
                const x1 = centro + radio * Math.cos((p1 - 90) * Math.PI / 180);
                const y1 = centro + radio * Math.sin((p1 - 90) * Math.PI / 180);
                const x2 = centro + radio * Math.cos((p2 - 90) * Math.PI / 180);
                const y2 = centro + radio * Math.sin((p2 - 90) * Math.PI / 180);
                const color = (asp.tipo === 'OPOSICIÓN' || asp.tipo === 'CUADRATURA') ? '#ff4d4d' : '#00ff88';
                svg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="1" opacity="0.4" />`;
            }
        });
        tensionLabel.innerText = `${aspectos.length} DETECTADOS`;
        tensionLabel.style.color = "#ff4d4d";
    } else {
        tensionLabel.innerText = "SINCRO LIMPIA";
        tensionLabel.style.color = "#00ff88";
    }

    // Dibujar Nodos (Puntos)
    Object.entries(vectores).forEach(([nom, grad]) => {
        const x = centro + radio * Math.cos((grad - 90) * Math.PI / 180);
        const y = centro + radio * Math.sin((grad - 90) * Math.PI / 180);
        svg += `<circle cx="${x}" cy="${y}" r="5" fill="#fff" />
                <text x="${x + 12}" y="${y + 4}" fill="#d4af37" font-size="10" font-weight="bold">${nom.toUpperCase()}</text>`;
    });
    
    document.getElementById('canvas-container').innerHTML = svg + `</svg>`;
}
window.onload = conectarNucleo;
</script>
</body>
</html>
