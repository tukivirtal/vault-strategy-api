<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vault Logic | Executive Bóveda</title>
    <style>
        :root { --gold: #d4af37; --alert: #ff4d4d; --safe: #00ff88; --dark: #050505; }
        body { background: var(--dark); color: var(--gold); font-family: 'JetBrains Mono', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .report-container { background: rgba(10, 10, 10, 0.98); border: 1px solid rgba(212, 175, 55, 0.2); padding: 50px; max-width: 900px; width: 100%; display: none; box-shadow: 0 0 100px #000; }
        h1 { letter-spacing: 0.6em; font-size: 1.1rem; text-align: center; border-bottom: 1px solid #222; padding-bottom: 20px; font-weight: 300; }
        .data-row { margin: 40px 0; border-left: 4px solid var(--gold); padding-left: 35px; }
        .value { font-size: 2.6rem; color: #fff; font-weight: 600; text-transform: uppercase; }
        #canvas-container { width: 380px; height: 380px; display: flex; align-items: center; justify-content: center; margin: 20px auto; border: 1px solid #111; border-radius: 50%; background: rgba(255,255,255,0.01); }
        .directiva { background: rgba(212,175,55,0.03); padding: 30px; border-left: 5px solid var(--gold); margin-top: 40px; color: #fff; font-size: 1.1rem; }
        .btn-nasa { background: var(--gold); color: #000; border: none; padding: 20px; width: 100%; font-weight: bold; letter-spacing: 0.3em; cursor: pointer; text-transform: uppercase; margin-top: 30px; outline: 1px solid var(--gold); outline-offset: 3px; }
        #loading-screen { text-align: center; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div style="letter-spacing: 0.5em; font-size: 1.2rem; color: var(--gold);">ESTABLECIENDO ENLACE...</div>
    <div id="status-msg" style="font-size: 0.7rem; color: #555; margin-top: 10px;">Sincronizando con el núcleo NASA JPL DE441...</div>
    <button id="btn-forzar" onclick="location.reload()" style="display:none; background:none; border:1px solid #333; color:#555; margin-top:20px; cursor:pointer; padding:5px 10px;">REINTENTAR CONEXIÓN</button>
</div>

<div class="report-container" id="reporte">
    <h1>VAULT LOGIC // EXECUTIVE TERMINAL</h1>
    <div class="data-row">
        <span style="font-size: 0.7rem; color: #555; text-transform: uppercase;">Sujeto de Análisis</span>
        <div class="value" id="nombre">---</div>
    </div>
    <div id="canvas-container"></div>
    <div class="directiva" id="directiva">---</div>
    <button class="btn-nasa" id="btn-next">ACTIVAR CENTRO DE COMANDO GÉNESIS</button>
</div>

<script>
async function iniciarAuditoria() {
    const email = new URLSearchParams(window.location.search).get('email');
    if (!email) return;

    try {
        const r = await fetch(`https://vault-strategy-api.onrender.com/obtener_reporte/${encodeURIComponent(email)}`);
        const res = await r.json();

        if (res.status === "success" && res.data?.mapatotal?.vectores_eclipticos) {
            document.getElementById('nombre').innerText = res.data.nombre.toUpperCase();
            document.getElementById('directiva').innerText = res.data.directiva;
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('reporte').style.display = 'block';
            
            dibujarRadar(res.data.mapatotal.vectores_eclipticos);
            
            document.getElementById('btn-next').onclick = () => {
                window.location.href = `genesis.html?email=${encodeURIComponent(email)}&nombre=${encodeURIComponent(res.data.nombre)}`;
            };
        } else {
            setTimeout(iniciarAuditoria, 2000); // Reintento automático infinito hasta que Supabase responda
        }
    } catch (e) {
        document.getElementById('btn-forzar').style.display = 'block';
    }
}

function dibujarRadar(vectores) {
    const centro = 190; const radio = 145;
    let svg = `<svg viewBox="0 0 380 380" style="width:100%; height:100%;">
        <circle cx="190" cy="190" r="145" fill="none" stroke="rgba(212,175,55,0.2)" stroke-width="1" />
        <line x1="190" y1="45" x2="190" y2="335" stroke="rgba(212,175,55,0.05)" />
        <line x1="45" y1="190" x2="335" y2="190" stroke="rgba(212,175,55,0.05)" />`;

    Object.entries(vectores).forEach(([nom, grad]) => {
        const x = centro + radio * Math.cos((grad - 90) * Math.PI / 180);
        const y = centro + radio * Math.sin((grad - 90) * Math.PI / 180);
        svg += `<circle cx="${x}" cy="${y}" r="4.5" fill="#fff" />
                <text x="${x + 12}" y="${y + 4}" fill="#d4af37" font-size="10" font-weight="bold">${nom.toUpperCase()}</text>`;
    });
    document.getElementById('canvas-container').innerHTML = svg + `</svg>`;
}
window.onload = iniciarAuditoria;
</script>
</body>
</html>
