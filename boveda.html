<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vault Logic | Executive Bóveda</title>
    <style>
        :root { --gold: #d4af37; --dark: #050505; }
        body { 
            background: var(--dark); color: var(--gold); font-family: 'JetBrains Mono', monospace; 
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; 
        }
        #loading-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        .report-container { 
            background: rgba(10, 10, 10, 0.98); border: 1px solid rgba(212, 175, 55, 0.2); 
            padding: 40px; max-width: 1000px; width: 90%; display: none; margin: 40px 0;
        }
        .value { font-size: 2.2rem; color: #fff; font-weight: 600; text-transform: uppercase; }
        
        /* ESTILO DATOS ORIGEN */
        #datos-origen { font-size: 0.85rem; color: var(--gold); font-weight: bold; margin-top: 10px; border-top: 1px solid #222; padding-top: 5px; }

        .vault-layout { display: flex; justify-content: space-between; align-items: center; margin: 30px 0; }
        #canvas-container { width: 380px; height: 380px; border-radius: 50%; border: 1px solid #1a1a1a; position: relative; }
        .directiva { background: rgba(212,175,55,0.05); padding: 25px; border-left: 4px solid var(--gold); color: #fff; margin-top: 20px; }
        .btn-nasa { background: var(--gold); color: #000; border: none; padding: 22px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 30px; }

        /* FOOTER FORZADO */
        footer { width: 100%; padding: 40px 0; background: #000; border-top: 1px solid #222; text-align: center; margin-top: auto; }
        footer a { color: var(--gold); text-decoration: none; margin: 0 15px; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

<div id="loading-screen">SINCRO NÚCLEO...</div>

<div class="report-container" id="reporte">
    <h1 style="text-align:center; letter-spacing:0.5em;">VAULT LOGIC TERMINAL</h1>
    
    <div style="border-left: 4px solid var(--gold); padding-left: 20px;">
        <span style="font-size: 0.7rem; color: #555;">SUJETO DE ANÁLISIS</span>
        <div class="value" id="nombre">---</div>
        <div id="datos-origen">CARGANDO COORDENADAS...</div>
    </div>

    <div class="vault-layout">
        <div id="listado-planetas" style="font-size: 0.7rem; color: #666;"></div>
        <div id="canvas-container"></div>
        <div style="text-align: right; font-size: 0.7rem;">
            STATUS: <b>ESTABLE</b><br>AUTH: <b id="auth-status">---</b><br>GEO: <b id="geo-display">---</b>
        </div>
    </div>

    <div class="directiva" id="directiva">---</div>
    <button class="btn-nasa" id="btn-next">INICIAR SECUENCIA</button>
</div>

<footer>
    <a href="privacidad.html">PRIVACIDAD</a>
    <a href="terminos.html">TÉRMINOS</a>
    <div style="font-size:0.5rem; color:#333; margin-top:10px;">VAULT LOGIC SYSTEMS 2026</div>
</footer>

<script>
async function conectar() {
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get('email') || "testing@gmail.com";
    
    try {
        const response = await fetch(`https://vault-strategy-api.onrender.com/obtener_reporte/${encodeURIComponent(email)}`);
        const res = await response.json();

        if (res.status === "success") {
            const d = res.data;
            document.getElementById('nombre').innerText = d.nombre.toUpperCase();
            
            // ASIGNACIÓN DIRECTA DE DATOS (FECHA, HORA, LUGAR)
            const fecha = new Date(d.fecha_nacimiento).toLocaleDateString('es-ES');
            document.getElementById('datos-origen').innerText = `${fecha} // ${d.hora_nacimiento} // ${d.lugar_nacimiento.toUpperCase()}`;

            // SUGERENCIA IA BASADA EN EL GRÁFICO
            let msgIA = d.directiva;
            if (d.analisis_kepler && d.analisis_kepler.length > 0) {
                const tipo = d.analisis_kepler[0].tipo;
                const mapa = { "OPOSICIÓN": "Los ángulos indican tensión: equilibre activos hoy.", "CONJUNCIÓN": "Singularidad detectada: momento de nuevas firmas.", "SEXTIL": "Flujo favorable: ventana para negociar." };
                msgIA = `<b>DIRECTIVA IA:</b> ${mapa[tipo] || d.directiva}`;
            }
            document.getElementById('directiva').innerHTML = msgIA;

            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('reporte').style.display = 'block';
            
            dibujar(d.mapatotal.vectores_eclipticos);
        }
    } catch (e) { console.log("Error"); }
}

function dibujar(vectores) {
    let svg = `<svg viewBox="0 0 380 380" style="width:100%; height:100%;"><circle cx="190" cy="190" r="145" fill="none" stroke="rgba(212,175,55,0.1)" />`;
    Object.entries(vectores).forEach(([nom, grad]) => {
        const rad = (grad - 90) * Math.PI / 180;
        const x = 190 + 145 * Math.cos(rad); const y = 190 + 145 * Math.sin(rad);
        svg += `<line x1="190" y1="190" x2="${x}" y2="${y}" stroke="rgba(212,175,55,0.2)" /><circle cx="${x}" cy="${y}" r="4" fill="#fff" /><text x="${x+8}" y="${y+4}" fill="#d4af37" font-size="10">${nom}</text>`;
    });
    document.getElementById('canvas-container').innerHTML = svg + `</svg>`;
}
window.onload = conectar;
</script>
</body>
</html>
