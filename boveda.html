<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vault Logic | Executive Bóveda</title>
    <style>
        :root { --gold: #d4af37; --alert: #ff4d4d; --safe: #00ff88; --dark: #050505; }
        body { background: #050505; color: var(--gold); font-family: 'JetBrains Mono', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .report-container { background: rgba(10, 10, 10, 0.98); border: 1px solid rgba(212, 175, 55, 0.2); padding: 50px; max-width: 900px; width: 100%; display: none; }
        h1 { letter-spacing: 0.6em; font-size: 1.1rem; text-align: center; border-bottom: 1px solid #222; padding-bottom: 20px; font-weight: 300; }
        .data-row { margin: 40px 0; border-left: 4px solid var(--gold); padding-left: 35px; }
        .value { font-size: 2.6rem; color: #fff; font-weight: 600; text-transform: uppercase; }
        .wheel-section { display: flex; align-items: center; justify-content: space-around; margin: 60px 0; }
        #canvas-container { width: 380px; height: 380px; display: flex; align-items: center; justify-content: center; position: relative; border: 1px solid #111; border-radius: 50%; }
        .btn-nasa { background: var(--gold); color: #000; border: none; padding: 20px; width: 100%; font-weight: bold; letter-spacing: 0.3em; cursor: pointer; text-transform: uppercase; margin-top: 30px; outline: 1px solid var(--gold); outline-offset: 3px; }
        #debug-box { font-size: 0.6rem; color: #444; margin-top: 20px; border: 1px solid #222; padding: 10px; display: none; }
    </style>
</head>
<body>

<div id="loading-screen" style="text-align: center;">
    <div style="letter-spacing: 0.5em; margin-bottom: 10px;">SINCRONIZANDO CON NÚCLEO...</div>
    <div id="status-update" style="font-size: 0.7rem; color: #555;">Iniciando protocolo de enlace...</div>
</div>

<div class="report-container" id="reporte">
    <h1>VAULT LOGIC // EXECUTIVE TERMINAL</h1>
    <div class="data-row">
        <span style="font-size: 0.7rem; color: #555; text-transform: uppercase;">Sujeto de Análisis</span>
        <div class="value" id="nombre">---</div>
    </div>
    <div class="wheel-section">
        <div id="canvas-container"></div>
    </div>
    <div id="directiva" style="background: rgba(212,175,55,0.03); padding: 25px; border-left: 5px solid var(--gold); color: #fff;">---</div>
    <button class="btn-nasa" onclick="location.href='suscripcion.html'">ACTIVAR CENTRO DE COMANDO GÉNESIS</button>
    
    <div id="debug-box"></div>
</div>

<script>
async function iniciarAuditoria() {
    const email = new URLSearchParams(window.location.search).get('email');
    if (!email) return;

    const statusLabel = document.getElementById('sync-label');
    const loadingText = document.getElementById('loading');

    try {
        const response = await fetch(`https://vault-strategy-api.onrender.com/obtener_reporte/${encodeURIComponent(email)}`);
        const res = await response.json();

        // VALIDACIÓN DE DATOS PROFUNDA
        if (res.status === "success" && res.data && res.data.mapatotal && res.data.mapatotal.vectores_eclipticos) {
            
            document.getElementById('nombre').innerText = res.data.nombre.toUpperCase();
            document.getElementById('directiva').innerText = res.data.directiva;
            loadingText.style.display = 'none';
            document.getElementById('reporte').style.display = 'block';
            
            // DIBUJAR EL RADAR
            renderizarRadar(res.data.mapatotal.vectores_eclipticos);
            
        } else {
            // SI EL USUARIO EXISTE PERO NO HAY VECTORES, REINTENTAR CADA 3 SEGUNDOS
            console.warn("Nucleo NASA calculando... reintentando.");
            statusLabel.innerText = "CALCULANDO VECTORES...";
            setTimeout(iniciarAuditoria, 3000);
        }
    } catch (e) {
        console.error("Error de conexión:", e);
        setTimeout(iniciarAuditoria, 5000);
    }
}

function renderizarRadar(vectores) {
    const container = document.getElementById('canvas-container');
    const centro = 190; const radio = 145;
    
    let svg = `<svg viewBox="0 0 380 380" style="width:100%; height:100%;">
        <circle cx="190" cy="190" r="145" fill="none" stroke="rgba(212,175,55,0.2)" stroke-width="1" />
        <circle cx="190" cy="190" r="100" fill="none" stroke="rgba(212,175,55,0.1)" stroke-width="1" />
        <line x1="190" y1="45" x2="190" y2="335" stroke="rgba(212,175,55,0.05)" />
        <line x1="45" y1="190" x2="335" y2="190" stroke="rgba(212,175,55,0.05)" />`;

    Object.entries(vectores).forEach(([nom, grad]) => {
        const x = centro + radio * Math.cos((grad - 90) * Math.PI / 180);
        const y = centro + radio * Math.sin((grad - 90) * Math.PI / 180);
        svg += `
            <line x1="190" y1="190" x2="${x}" y2="${y}" stroke="rgba(212,175,55,0.2)" stroke-width="0.5" />
            <circle cx="${x}" cy="${y}" r="4.5" fill="#fff" />
            <text x="${x + 12}" y="${y + 4}" fill="#d4af37" font-size="10" font-weight="bold">${nom.toUpperCase()}</text>`;
    });

    svg += `</svg>`;
    container.innerHTML = svg;
}

function renderizarSVG(vectores) {
    const container = document.getElementById('canvas-container');
    const centro = 190; const radio = 145;
    
    let svg = `<svg viewBox="0 0 380 380" style="width:100%; height:100%;">
        <circle cx="190" cy="190" r="145" fill="none" stroke="rgba(212,175,55,0.15)" stroke-width="1" />
        <line x1="190" y1="45" x2="190" y2="335" stroke="rgba(212,175,55,0.05)" />
        <line x1="45" y1="190" x2="335" y2="190" stroke="rgba(212,175,55,0.05)" />`;

    Object.entries(vectores).forEach(([nom, grad]) => {
        const x = centro + radio * Math.cos((grad - 90) * Math.PI / 180);
        const y = centro + radio * Math.sin((grad - 90) * Math.PI / 180);
        svg += `
            <line x1="190" y1="190" x2="${x}" y2="${y}" stroke="rgba(212,175,55,0.2)" stroke-width="0.5" />
            <circle cx="${x}" cy="${y}" r="4" fill="#fff" />
            <text x="${x + 12}" y="${y + 4}" fill="#d4af37" font-size="9" font-weight="bold">${nom.toUpperCase()}</text>`;
    });

    container.innerHTML = svg + `</svg>`;
}

window.onload = iniciarAuditoria;
</script>
</body>
</html>
