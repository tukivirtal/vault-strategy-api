<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vault Logic | Executive Bóveda</title>
    <style>
        :root { --gold: #d4af37; --dark: #050505; }
        body { 
            background: var(--dark); color: var(--gold); font-family: 'JetBrains Mono', monospace; 
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; 
        }
        
        /* Pantalla de carga central */
        #loading-screen { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; width: 100%; text-align: center; 
        }

        .report-container { 
            background: rgba(10, 10, 10, 0.98); border: 1px solid rgba(212, 175, 55, 0.2); 
            padding: 40px; max-width: 1000px; width: 90%; display: none; margin: 40px 0;
        }

        .value { font-size: 2.2rem; color: #fff; font-weight: 600; text-transform: uppercase; }
        
        /* ESTILO DATOS ORIGEN - VISIBILIDAD REFORZADA */
        #datos-origen { 
            font-size: 0.9rem; color: var(--gold); font-weight: bold; 
            margin-top: 10px; border-top: 1px solid #222; padding-top: 10px;
            letter-spacing: 2px;
        }

        .vault-layout { display: flex; justify-content: space-between; align-items: center; margin: 30px 0; gap: 20px; }
        #canvas-container { width: 380px; height: 380px; border-radius: 50%; border: 1px solid #1a1a1a; position: relative; }
        
        .directiva { background: rgba(212,175,55,0.05); padding: 25px; border-left: 4px solid var(--gold); color: #fff; margin-top: 20px; line-height: 1.6; }
        .directiva b { color: var(--gold); letter-spacing: 1px; }

        .btn-nasa { background: var(--gold); color: #000; border: none; padding: 22px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 30px; letter-spacing: 3px; text-transform: uppercase; }

        /* FOOTER FORZADO AL FINAL */
        footer { 
            width: 100%; padding: 60px 0; background: #000; border-top: 1px solid #222; 
            text-align: center; margin-top: auto; display: none; /* Solo se activa al cargar el reporte */
        }
        footer a { color: var(--gold); text-decoration: none; margin: 0 15px; font-size: 0.85rem; font-weight: bold; opacity: 0.7; }
        footer a:hover { opacity: 1; text-shadow: 0 0 10px var(--gold); }
    </style>
</head>
<body>

<div id="loading-screen">
    <div style="letter-spacing: 0.5em; font-size: 1.2rem;">SINCRO NÚCLEO...</div>
    <div style="font-size: 0.7rem; color: #444; margin-top: 15px;">Conectando con NASA JPL DE441 Source...</div>
</div>

<div class="report-container" id="reporte">
    <h1 style="text-align:center; letter-spacing:0.5em;">VAULT LOGIC TERMINAL</h1>
    
    <div style="border-left: 4px solid var(--gold); padding-left: 20px;">
        <span style="font-size: 0.7rem; color: #555;">SUJETO DE ANÁLISIS</span>
        <div class="value" id="nombre">---</div>
        <div id="datos-origen">IDENTIFICANDO COORDENADAS NATALES...</div>
    </div>

    <div class="vault-layout">
        <div id="listado-planetas" style="font-size: 0.7rem; color: #666; width: 150px;"></div>
        <div id="canvas-container"></div>
        <div style="text-align: right; font-size: 0.7rem; width: 150px;">
            STATUS: <b>ESTABLE</b><br>
            AUTH: <b id="auth-status" style="color:#fff">VERIFYING</b><br>
            GEO: <b id="geo-display" style="color:#fff">---</b>
        </div>
    </div>

    <div class="directiva" id="directiva">---</div>
    <button class="btn-nasa" id="btn-next">INICIAR SECUENCIA</button>
</div>

<footer id="main-footer">
    <div style="margin-bottom: 15px;">
        <a href="privacidad.html">PRIVACIDAD</a>
        <a href="terminos.html">TÉRMINOS</a>
    </div>
    <div style="font-size:0.6rem; color:#333; letter-spacing: 5px;">VAULT LOGIC SYSTEMS // GLOBAL COMPLIANCE 2026</div>
</footer>

<script>
async function conectar() {
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get('email') || localStorage.getItem('vault_user_email');
    
    if (!email) {
        document.getElementById('loading-screen').innerHTML = "ERROR: SESIÓN NO VINCULADA";
        return;
    }

    try {
        const response = await fetch(`https://vault-strategy-api.onrender.com/obtener_reporte/${encodeURIComponent(email)}`);
        const res = await response.json();

        if (res.status === "success" && res.data) {
            const d = res.data;
            
            // 1. ESCRIBIR NOMBRE
            document.getElementById('nombre').innerText = d.nombre.toUpperCase();
            
            // 2. ESCRIBIR TELEMETRÍA (FECHA // HORA // LUGAR)
            const fechaNorm = new Date(d.fecha_nacimiento).toLocaleDateString('es-ES');
            const horaNorm = d.hora_nacimiento || "00:00";
            const lugarNorm = (d.lugar_nacimiento || "Sincronizando...").toUpperCase();
            document.getElementById('datos-origen').innerText = `${fechaNorm} // ${horaNorm} // ${lugarNorm}`;

            // 3. LÓGICA DE ENGANCHE IA (Alineada con el dibujo planetario)
            let sugerenciaEnganche = `<b>DIRECTIVA:</b> ${d.directiva}`;
            
            if (d.analisis_kepler && d.analisis_kepler.length > 0) {
                const tipoAspecto = d.analisis_kepler[0].tipo;
                const interpretaciones = {
                    "OPOSICIÓN": "Los ángulos indican un contraste crítico: hoy es el momento ideal para equilibrar sus activos.",
                    "CONJUNCIÓN": "Se detecta una singularidad energética: es un día óptimo para lanzamientos y firmas.",
                    "SEXTIL": "Los vectores muestran una oportunidad fluida: use esta ventana para negociaciones.",
                    "TRÍGONO": "Sincronía total detectada: los flujos favorecen la expansión masiva de capital."
                };
                const baseTexto = interpretaciones[tipoAspecto] || "Fase operativa estable detectada.";
                sugerenciaEnganche = `<b>DIRECTIVA IA:</b> ${baseTexto} <br><small>[NÚCLEO: ${d.analisis_kepler[0].puntos}]</small>`;
            }
            document.getElementById('directiva').innerHTML = sugerenciaEnganche;

            // 4. DATOS DE SIDEBAR
            document.getElementById('geo-display').innerText = d.geo_ref ? d.geo_ref.split('|')[0] : "LAT: 0.0";
            document.getElementById('auth-status').innerText = "VERIFIED";

            // 5. MOSTRAR TODO Y QUITAR LOADER
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('reporte').style.display = 'block';
            document.getElementById('main-footer').style.display = 'block';
            
            dibujarRadar(d.mapatotal.vectores_eclipticos);
        }
    } catch (e) { 
        console.error("Fallo de enlace"); 
    }
}

function dibujarRadar(vectores) {
    let svg = `<svg viewBox="0 0 380 380" style="width:100%; height:100%;">
        <circle cx="190" cy="190" r="145" fill="none" stroke="rgba(212,175,55,0.1)" stroke-width="1" />
        <circle cx="190" cy="190" r="100" fill="none" stroke="rgba(212,175,55,0.05)" stroke-width="1" />`;

    Object.entries(vectores).forEach(([nom, grad]) => {
        const rad = (grad - 90) * Math.PI / 180;
        const x = 190 + 145 * Math.cos(rad);
        const y = 190 + 145 * Math.sin(rad);
        svg += `<line x1="190" y1="190" x2="${x}" y2="${y}" stroke="rgba(212,175,55,0.2)" stroke-width="0.5" />
                <circle cx="${x}" cy="${y}" r="4" fill="#fff" />
                <text x="${x + 8}" y="${y + 4}" fill="#d4af37" font-size="9" font-weight="bold">${nom}</text>`;
    });
    document.getElementById('canvas-container').innerHTML = svg + `</svg>`;
}

window.onload = conectar;
</script>
</body>
</html>
