<div class="wheel-section">
    <div id="radar-status" style="text-align: right; font-size: 0.7rem; color: #444;">
        ESTADO DEL NÚCLEO<br><b id="sync-label" style="color:var(--gold)">BUSCANDO SEÑAL...</b>
    </div>
    
    <div id="canvas-container">
        <div class="radar-scan">
            <svg viewBox="0 0 380 380" id="svg-boveda" style="width:100%; height:100%;">
                <circle cx="190" cy="190" r="145" fill="none" stroke="rgba(212,175,55,0.2)" stroke-width="1" />
                <circle cx="190" cy="190" r="100" fill="none" stroke="rgba(212,175,55,0.1)" stroke-width="1" />
                <circle cx="190" cy="190" r="50" fill="none" stroke="rgba(212,175,55,0.1)" stroke-width="1" />
                <line x1="190" y1="45" x2="190" y2="335" stroke="rgba(212,175,55,0.1)" />
                <line x1="45" y1="190" x2="335" y2="190" stroke="rgba(212,175,55,0.1)" />
                <g id="capa-dinamica"></g>
            </svg>
        </div>
    </div>

    <div style="text-align: left; font-size: 0.7rem; color: #444;">
        VECTORES DE IMPACTO<br><b id="tension-count" style="color:var(--safe)">SINCRO OK</b>
    </div>
</div>

<script>
// ESTRATEGIA DE REINTENTO (Polling)
async function cargarConReintento() {
    const email = new URLSearchParams(window.location.search).get('email');
    let intentos = 0;
    
    const ejecutar = async () => {
        try {
            const r = await fetch(`https://vault-strategy-api.onrender.com/obtener_reporte/${encodeURIComponent(email)}`);
            const res = await r.json();
            
            if (res.status === "success" && res.data.mapatotal) {
                document.getElementById('nombre').innerText = res.data.nombre.toUpperCase();
                document.getElementById('directiva').innerText = res.data.directiva;
                document.getElementById('sync-label').innerText = "10/10 SECURE";
                document.getElementById('loading').style.display = 'none';
                document.getElementById('reporte').style.display = 'block';
                
                renderizarRadar(res.data.mapatotal.vectores_eclipticos);
            } else {
                throw new Error("Aún no hay datos");
            }
        } catch (e) {
            intentos++;
            if (intentos < 5) { // Reintenta cada 2 segundos por 10 segundos total
                console.log("Esperando a Supabase... reintento " + intentos);
                setTimeout(ejecutar, 2000);
            } else {
                document.getElementById('loading').innerText = "ERROR: TIEMPO DE ESPERA AGOTADO";
            }
        }
    };
    ejecutar();
}

function renderizarRadar(vectores) {
    const capa = document.getElementById('capa-dinamica');
    const centro = 190; const radio = 145;
    let html = "";
    
    Object.entries(vectores).forEach(([nom, grad]) => {
        const x = centro + radio * Math.cos((grad - 90) * Math.PI / 180);
        const y = centro + radio * Math.sin((grad - 90) * Math.PI / 180);
        html += `
            <line x1="190" y1="190" x2="${x}" y2="${y}" stroke="rgba(212,175,55,0.3)" stroke-width="0.5" />
            <circle cx="${x}" cy="${y}" r="5" fill="#fff" />
            <text x="${x + 10}" y="${y}" fill="#d4af37" font-size="9" font-weight="bold">${nom.toUpperCase()}</text>`;
    });
    capa.innerHTML = html;
}
window.onload = cargarConReintento;
</script>
