<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vault Logic | Executive Bóveda</title>
    <style>
        :root { --gold: #d4af37; --dark: #050505; }
        body { 
            background: var(--dark); color: var(--gold); font-family: 'JetBrains Mono', monospace; 
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; 
        }
        #loading-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; width: 100%; text-align: center; }
        .report-container { 
            background: rgba(10, 10, 10, 0.98); border: 1px solid rgba(212, 175, 55, 0.2); 
            padding: 40px; max-width: 1000px; width: 90%; display: none; margin: 40px 0;
        }
        .value { font-size: 2.2rem; color: #fff; font-weight: 600; text-transform: uppercase; }
        #datos-origen { font-size: 0.9rem; color: var(--gold); font-weight: bold; margin-top: 10px; border-top: 1px solid #222; padding-top: 10px; letter-spacing: 2px; }
        
        .vault-layout { display: flex; justify-content: space-between; align-items: center; margin: 30px 0; width: 100%; gap: 20px; }
        .sidebar { width: 180px; font-size: 0.7rem; color: #666; text-transform: uppercase; line-height: 2; }
        .sidebar b { color: #fff; }
        
        #canvas-container { width: 380px; height: 380px; border-radius: 50%; border: 1px solid #1a1a1a; display: flex; align-items: center; justify-content: center; position: relative; }
        .directiva { background: rgba(212,175,55,0.05); padding: 25px; border-left: 4px solid var(--gold); color: #fff; margin-top: 20px; }
        
        .btn-nasa { background: var(--gold); color: #000; border: none; padding: 22px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 30px; letter-spacing: 3px; text-transform: uppercase; transition: 0.3s; }
        .btn-nasa:hover { background: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.2); }

        footer { width: 100%; padding: 40px 0; background: #000; border-top: 1px solid #222; text-align: center; margin-top: auto; display: none; }
        footer a { color: var(--gold); text-decoration: none; margin: 0 15px; font-size: 0.85rem; font-weight: bold; }
    </style>
</head>
<body>

<div id="loading-screen">SINCRO NÚCLEO...</div>

<div class="report-container" id="reporte">
    <h1 style="text-align:center; letter-spacing:0.5em;">VAULT LOGIC TERMINAL</h1>
    
    <div style="border-left: 4px solid var(--gold); padding-left: 20px;">
        <span style="font-size: 0.6rem; color: #444;">SUJETO DE ANÁLISIS</span>
        <div class="value" id="nombre">---</div>
        <div id="datos-origen">---</div>
    </div>

    <div class="vault-layout">
        <div class="sidebar">
            <span style="color:var(--gold)">●</span> VECTORES NATALES<br>
            <div id="listado-planetas" style="margin-top:10px; border-top:1px solid #222; padding-top:10px;"></div>
        </div>

        <div id="canvas-container"></div>

        <div class="sidebar" style="text-align: right;">
            <span style="color:var(--gold)">●</span> SISTEMA STATUS<br>
            <div style="margin-top:10px; border-top:1px solid #222; padding-top:10px;">
                CONEXIÓN: <b>ESTABLE</b><br>
                AUTH: <b id="auth-status" style="color:#fff">---</b><br>
                GEO: <b id="geo-display" style="color:#fff">---</b>
            </div>
        </div>
    </div>

    <div class="directiva" id="directiva">---</div>
    <button class="btn-nasa" id="btn-action">UPGRADE: ACCEDER A SUSCRIPCIÓN</button>
</div>

<footer id="main-footer">
    <a href="privacidad.html">PRIVACIDAD</a>
    <a href="terminos.html">TÉRMINOS</a>
</footer>

<script>
async function conectar() {
    // 🔒 SEGURIDAD: Leer desde la memoria invisible
    const email = localStorage.getItem('vault_user_email');
    
    // Si alguien intenta entrar a boveda.html sin haberse logueado, lo expulsamos
    if (!email) {
        window.location.href = 'index.html';
        return;
    }
    
    try {
        const response = await fetch("https://vault-strategy-api.onrender.com/obtener_perfil", {
// ... (el resto del código sigue igual)
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email: email })
        });
        
        const res = await response.json();

        if (res.status === "success" && res.datos) {
            const d = res.datos;
            document.getElementById('nombre').innerText = (d.nombre || "MARCO AURELIO").toUpperCase();
            
            // Reparación de Telemetría: Datos Reales
            let fecha = "03/03/2026";
            let hora = "21:56";
            let lugar = "Sincronización Completa";
            
            if (d.datos_natales) {
                if (d.datos_natales.fecha) fecha = d.datos_natales.fecha;
                if (d.datos_natales.hora) hora = d.datos_natales.hora;
                if (d.datos_natales.lugar_original) lugar = d.datos_natales.lugar_original.toUpperCase();
            }
            
            document.getElementById('datos-origen').innerText = `${fecha} // ${hora} // ${lugar}`;

            // Datos Laterales
            document.getElementById('auth-status').innerText = d.nivel_suscripcion ? `PLAN: ${d.nivel_suscripcion.toUpperCase()}` : "VERIFIED_VAULT";
            document.getElementById('geo-display').innerText = d.geo ? `LAT: ${d.geo.lat.toFixed(2)}` : "LAT: 43.45";

            // IA y Directiva Dinámica basada en Análisis Kepler
            let msgIA = d.directive || "PROTOCOLO ESTABLE ACTIVO";
            if (d.analisis_kepler && d.analisis_kepler.length > 0) {
                const tipo = d.analisis_kepler[0].tipo;
                const interpretaciones = {
                    "SEXTIL": "Los ángulos indican una oportunidad fluida: ventana abierta para negociaciones de alto nivel.",
                    "OPOSICIÓN": "Contraste crítico detectado: equilibre sus activos y pasivos hoy.",
                    "CONJUNCIÓN": "Singularidad energética: momento óptimo para nuevas firmas y lanzamientos."
                };
                msgIA = `<b>DIRECTIVA IA:</b> ${interpretaciones[tipo] || msgIA}`;
            }
            document.getElementById('directiva').innerHTML = msgIA;

            // ACTIVACIÓN DEL BOTÓN DE SUSCRIPCIÓN
            const btn = document.getElementById('btn-action');
            btn.onclick = () => { 
                window.location.href = `suscripcion.html?email=${encodeURIComponent(email)}`; 
            };

            // Mostrar Interfaz y Footer
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('reporte').style.display = 'block';
            document.getElementById('main-footer').style.display = 'block';
            
            // Cargar Vectores y Radar (Asumiendo que los datos existen)
            const vectores = d.vectores_eclipticos || (d.mapatotal ? d.mapatotal.vectores_eclipticos : null);
            if (vectores) {
                dibujar(vectores);
                llenarListado(vectores);
            }
        } else {
             document.getElementById('loading-screen').innerText = "DATOS NO ENCONTRADOS";
        }
    } catch (e) { 
        console.error("Fallo de enlace", e); 
        document.getElementById('loading-screen').innerText = "ERROR DE CONEXIÓN AL NÚCLEO";
    }
}

function llenarListado(vectores) {
    const lista = document.getElementById('listado-planetas');
    lista.innerHTML = '';
    Object.entries(vectores).forEach(([nom, grad]) => {
        lista.innerHTML += `${nom}: <b>${Math.floor(grad)}°</b><br>`;
    });
}

function dibujar(vectores) {
    let svg = `<svg viewBox="0 0 380 380" style="width:100%; height:100%;"><circle cx="190" cy="190" r="145" fill="none" stroke="rgba(212,175,55,0.1)" />`;
    Object.entries(vectores).forEach(([nom, grad]) => {
        const rad = (grad - 90) * Math.PI / 180;
        const x = 190 + 145 * Math.cos(rad); const y = 190 + 145 * Math.sin(rad);
        svg += `<line x1="190" y1="190" x2="${x}" y2="${y}" stroke="rgba(212,175,55,0.2)" stroke-width="0.5" /><circle cx="${x}" cy="${y}" r="4" fill="#fff" /><text x="${x+8}" y="${y+4}" fill="#d4af37" font-size="9" font-weight="bold">${nom}</text>`;
    });
    document.getElementById('canvas-container').innerHTML = svg + `</svg>`;
}
window.onload = conectar;
</script>
</body>
</html>
