<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vault Logic | Executive Bóveda</title>
    <style>
        :root { --gold: #d4af37; --dark: #050505; --gray: #444; }
        
        /* CORRECCIÓN DE FLUJO: Permitimos que el body crezca para mostrar el footer */
        body { 
            background: var(--dark); 
            color: var(--gold); 
            font-family: 'JetBrains Mono', monospace; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        #loading-screen { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; 
        }

        .report-container { 
            background: rgba(10, 10, 10, 0.98); 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            padding: 40px; 
            max-width: 1000px; 
            width: 90%; 
            display: none; /* Se activa al cargar */
            box-shadow: 0 0 100px #000; 
            margin: 40px 0;
        }
        
        h1 { letter-spacing: 0.6em; font-size: 1rem; text-align: center; border-bottom: 1px solid #222; padding-bottom: 20px; color: var(--gold); }
        
        .vault-layout { display: flex; justify-content: space-between; align-items: center; margin: 30px 0; gap: 20px; }
        
        .tech-sidebar { width: 180px; font-size: 0.65rem; color: #666; text-transform: uppercase; letter-spacing: 0.15em; line-height: 2.2; }
        .tech-sidebar b { color: #fff; }
        
        .value { font-size: 2.2rem; color: #fff; font-weight: 600; text-transform: uppercase; letter-spacing: -1px; }
        
        /* TELEMETRÍA DE NACIMIENTO */
        #datos-origen { 
            font-size: 0.85rem; 
            color: var(--gold); 
            opacity: 0.8; 
            letter-spacing: 0.2em; 
            margin-top: 10px; 
            font-weight: bold;
            border-top: 1px solid rgba(212,175,55,0.1);
            display: inline-block;
            padding-top: 5px;
        }

        #canvas-container { width: 380px; height: 380px; border: 1px solid #1a1a1a; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; }
        
        .directiva { background: rgba(212,175,55,0.05); padding: 25px; border-left: 4px solid var(--gold); color: #fff; font-size: 1.1rem; line-height: 1.6; margin-top: 20px; }

        .btn-nasa { background: var(--gold); color: #000; border: none; padding: 22px; width: 100%; font-weight: bold; letter-spacing: 0.4em; cursor: pointer; text-transform: uppercase; margin-top: 30px; }

        /* FOOTER CORREGIDO */
        footer { 
            width: 100%; 
            padding: 50px 0; 
            background: #000; 
            border-top: 1px solid rgba(212,175,55,0.1); 
            text-align: center;
            margin-top: auto; /* Empuja al final */
        }
        .footer-links a { color: var(--gold); text-decoration: none; font-size: 0.9rem; margin: 0 20px; letter-spacing: 2px; font-weight: bold; }
        .footer-tag { font-size: 0.6rem; color: #444; letter-spacing: 5px; margin-top: 15px; }

        #activation-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div style="letter-spacing: 0.5em;">SINCRO NÚCLEO...</div>
    <div id="status-msg" style="font-size: 0.7rem; color: #555; margin-top: 20px;">Conectando con NASA JPL...</div>
</div>

<div class="report-container" id="reporte">
    <h1>VAULT LOGIC // EXECUTIVE TERMINAL</h1>
    
    <div style="margin-top: 30px; border-left: 4px solid var(--gold); padding-left: 20px;">
        <span style="font-size: 0.7rem; color: #555;">SUJETO DE ANÁLISIS</span>
        <div class="value" id="nombre">---</div>
        <div id="datos-origen">SINCRONIZANDO COORDENADAS...</div>
    </div>

    <div class="vault-layout">
        <div class="tech-sidebar" id="listado-planetas"></div>
        <div id="canvas-container"></div>
        <div class="tech-sidebar" style="text-align: right;">
            STATUS: <b>ESTABLE</b><br>
            AUTH: <b id="auth-status" style="color:var(--gold)">---</b><br>
            GEO: <b id="geo-display">---</b>
        </div>
    </div>

    <div class="directiva" id="directiva">---</div>
    <button class="btn-nasa" id="btn-next">INICIAR SECUENCIA</button>
</div>

<footer id="main-footer" style="display: none;">
    <div class="footer-links">
        <a href="privacidad.html">PRIVACIDAD</a>
        <a href="terminos.html">TÉRMINOS</a>
    </div>
    <div class="footer-tag">VAULT LOGIC SYSTEMS // GLOBAL COMPLIANCE 2026</div>
</footer>

<script>
async function conectarNucleo() {
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get('email') || localStorage.getItem('vault_user_email');
    
    if (!email) { window.location.href = 'index.html'; return; }

    try {
        const response = await fetch(`https://vault-strategy-api.onrender.com/obtener_reporte/${encodeURIComponent(email)}`);
        const res = await response.json();

        if (res.status === "success") {
            const d = res.data;
            
            // 1. ESCRIBIR NOMBRE
            document.getElementById('nombre').innerText = d.nombre.toUpperCase();
            
            // 2. ESCRIBIR TELEMETRÍA (El cambio que no se veía)
            const fecha = new Date(d.fecha_nacimiento).toLocaleDateString('es-ES');
            document.getElementById('datos-origen').innerText = `${fecha} // ${d.hora_nacimiento} // ${d.lugar_nacimiento.toUpperCase()}`;

            // 3. LÓGICA DE IA (Alineada con el dibujo)
            let sugerencia = `<b>DIRECTIVA:</b> ${d.directiva}`;
            if (d.analisis_kepler && d.analisis_kepler.length > 0) {
                const tipo = d.analisis_kepler[0].tipo;
                const mapaDirectivas = {
                    "OPOSICIÓN": "Los ángulos indican un contraste crítico: hoy es momento de equilibrar activos.",
                    "CONJUNCIÓN": "Singularidad detectada: día óptimo para nuevas firmas.",
                    "SEXTIL": "Oportunidad fluida: ventana abierta para negociaciones."
                };
                sugerencia = `<b>DIRECTIVA IA:</b> ${mapaDirectivas[tipo] || d.directiva}`;
            }
            document.getElementById('directiva').innerHTML = sugerencia;

            // 4. ACTIVAR PANTALLA
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('reporte').style.display = 'block';
            document.getElementById('main-footer').style.display = 'block';

            dibujarRadar(d.mapatotal.vectores_eclipticos);
        }
    } catch (e) { console.error("Error de enlace"); }
}

function dibujarRadar(vectores) {
    let svg = `<svg viewBox="0 0 380 380" style="width:100%; height:100%;">
        <circle cx="190" cy="190" r="145" fill="none" stroke="rgba(212,175,55,0.1)" />`;
    Object.entries(vectores).forEach(([nom, grad]) => {
        const rad = (grad - 90) * Math.PI / 180;
        const x = 190 + 145 * Math.cos(rad);
        const y = 190 + 145 * Math.sin(rad);
        svg += `<line x1="190" y1="190" x2="${x}" y2="${y}" stroke="rgba(212,175,55,0.2)" />
                <circle cx="${x}" cy="${y}" r="4" fill="#fff" />
                <text x="${x+8}" y="${y+4}" fill="#d4af37" font-size="10">${nom}</text>`;
    });
    document.getElementById('canvas-container').innerHTML = svg + `</svg>`;
}

window.onload = conectarNucleo;
</script>
</body>
</html>
