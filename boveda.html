<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vault Logic | Executive Bóveda</title>
    <style>
        :root { --gold: #d4af37; --dark: #050505; --gray: #444; }
        body { background: var(--dark); color: var(--gold); font-family: 'JetBrains Mono', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        
        #loading-screen { text-align: center; }
        .report-container { background: rgba(10, 10, 10, 0.98); border: 1px solid rgba(212, 175, 55, 0.2); padding: 40px; max-width: 1000px; width: 95%; display: none; box-shadow: 0 0 100px #000; position: relative; }
        
        h1 { letter-spacing: 0.6em; font-size: 1rem; text-align: center; border-bottom: 1px solid #222; padding-bottom: 20px; color: var(--gold); opacity: 0.8; }
        
        .vault-layout { display: flex; justify-content: space-between; align-items: center; margin: 30px 0; gap: 20px; }
        
        /* Paneles laterales de datos técnicos */
        .tech-sidebar { width: 180px; font-size: 0.65rem; color: #666; text-transform: uppercase; letter-spacing: 0.15em; line-height: 2.2; }
        .tech-sidebar b { color: #fff; }
        .status-dot { width: 6px; height: 6px; background: var(--gold); display: inline-block; border-radius: 50%; margin-right: 8px; box-shadow: 0 0 10px var(--gold); }

        .value { font-size: 2.2rem; color: #fff; font-weight: 600; text-transform: uppercase; letter-spacing: -1px; }
        
        /* Contenedor del Radar */
        #canvas-container { width: 380px; height: 380px; border: 1px solid #1a1a1a; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; background: radial-gradient(circle, rgba(212,175,55,0.05) 0%, transparent 70%); }
        
        /* Animación de escáner */
        #canvas-container::after { content: ""; position: absolute; width: 100%; height: 100%; border-radius: 50%; border-top: 2px solid rgba(212,175,55,0.2); animation: rotate 4s linear infinite; pointer-events: none; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .directiva { background: rgba(212,175,55,0.03); padding: 20px; border-left: 4px solid var(--gold); color: #fff; font-size: 1rem; line-height: 1.6; margin-top: 20px; font-style: italic; }

        /* Botón Premium */
        .btn-nasa { background: var(--gold); color: #000; border: none; padding: 22px; width: 100%; font-weight: bold; letter-spacing: 0.4em; cursor: pointer; text-transform: uppercase; margin-top: 30px; transition: 0.4s; box-shadow: 0 0 20px rgba(212,175,55,0.2); }
        .btn-nasa:hover { background: #fff; box-shadow: 0 0 40px rgba(212,175,55,0.4); transform: scale(1.01); }

        .loader-bar { width: 200px; height: 2px; background: #111; margin: 20px auto; position: relative; overflow: hidden; }
        .loader-bar::after { content: ""; position: absolute; width: 50px; height: 100%; background: var(--gold); animation: slide 1.5s infinite linear; }
        @keyframes slide { from { left: -50px; } to { left: 200px; } }
    </style>
</head>
<body>

<div id="loading-screen">
    <div style="letter-spacing: 0.5em; font-size: 1.2rem;">SINCRO NÚCLEO...</div>
    <div class="loader-bar"></div>
    <div id="status-msg" style="font-size: 0.7rem; color: #555;">Conectando con NASA JPL DE441...</div>
</div>

<div class="report-container" id="reporte">
    <h1>VAULT LOGIC // EXECUTIVE TERMINAL</h1>
    
    <div style="margin-top: 30px; border-left: 4px solid var(--gold); padding-left: 20px;">
        <span style="font-size: 0.7rem; color: #555; letter-spacing: 0.3em;">SUJETO DE ANÁLISIS</span>
        <div class="value" id="nombre">---</div>
    </div>

    <div class="vault-layout">
        <div class="tech-sidebar" id="planet-data">
            <span class="status-dot"></span>VECTORES NATALES<br>
            <div id="listado-planetas" style="margin-top: 10px; border-top: 1px solid #222; padding-top: 10px;">
                </div>
        </div>

        <div id="canvas-container"></div>

        <div class="tech-sidebar" style="text-align: right;">
            <span class="status-dot"></span>SISTEMA STATUS<br>
            <div style="margin-top: 10px; border-top: 1px solid #222; padding-top: 10px;">
                CONEXIÓN: <b>ESTABLE</b><br>
                AUTH: <b>VERIFIED</b><br>
                GEO: <b id="geo-display">---</b><br>
                ENC: <b>AES-256</b>
            </div>
        </div>
    </div>

    <div class="directiva" id="directiva">---</div>
    
    <button class="btn-nasa" id="btn-next">ACTIVAR CENTRO DE COMANDO GÉNESIS</button>

    <div style="text-align: center; margin-top: 25px; font-size: 0.5rem; color: #333; letter-spacing: 0.5em;">
        CLASSIFIED INFORMATION - EYES ONLY
    </div>
</div>

<script>
async function conectarNucleo() {
    const urlParams = new URLSearchParams(window.location.search);
    let email = urlParams.get('email');
    if (email) email = decodeURIComponent(email).trim();

    const statusMsg = document.getElementById('status-msg');

    try {
        const response = await fetch(`https://vault-strategy-api.onrender.com/obtener_reporte/${encodeURIComponent(email)}`);
        const res = await response.json();

        if (res.status === "success" && res.data) {
            document.getElementById('nombre').innerText = res.data.nombre.toUpperCase();
            document.getElementById('directiva').innerText = res.data.directiva;
            document.getElementById('geo-display').innerText = res.data.geo_ref.split('|')[0].replace('LAT:', '');
            
            // Llenar Bóveda
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('reporte').style.display = 'block';
            
            // Dibujar con datos reales o respaldo si no existen
            const vectores = res.data.mapatotal ? res.data.mapatotal.vectores_eclipticos : {"SOL":0, "LUNA":45, "MARTE":90};
            dibujarRadar(vectores);
            llenarSideData(vectores);

            document.getElementById('btn-next').onclick = () => {
                window.location.href = `genesis-live.html?email=${encodeURIComponent(email)}&nombre=${encodeURIComponent(res.data.nombre)}`;
            };
        } else {
            statusMsg.innerText = "CÁLCULO EN PROCESO... REINTENTANDO.";
            setTimeout(conectarNucleo, 3000);
        }
    } catch (e) {
        statusMsg.innerText = "ERROR DE ENLACE. RECONECTANDO...";
        setTimeout(conectarNucleo, 4000);
    }
}

function llenarSideData(vectores) {
    const listado = document.getElementById('listado-planetas');
    listado.innerHTML = '';
    Object.entries(vectores).forEach(([nom, grad]) => {
        listado.innerHTML += `${nom}: <b>${Math.floor(grad)}°</b><br>`;
    });
}

function dibujarRadar(vectores) {
    const centro = 190; const radio = 145;
    let svg = `<svg viewBox="0 0 380 380" style="width:100%; height:100%;">
        <circle cx="190" cy="190" r="145" fill="none" stroke="rgba(212,175,55,0.1)" stroke-width="1" />
        <circle cx="190" cy="190" r="100" fill="none" stroke="rgba(212,175,55,0.05)" stroke-width="1" />
        <line x1="190" y1="45" x2="190" y2="335" stroke="rgba(212,175,55,0.05)" />
        <line x1="45" y1="190" x2="335" y2="190" stroke="rgba(212,175,55,0.05)" />`;

    Object.entries(vectores).forEach(([nom, grad]) => {
        const x = centro + radio * Math.cos((grad - 90) * Math.PI / 180);
        const y = centro + radio * Math.sin((grad - 90) * Math.PI / 180);
        svg += `<line x1="190" y1="190" x2="${x}" y2="${y}" stroke="rgba(212,175,55,0.2)" stroke-width="0.5" />
                <circle cx="${x}" cy="${y}" r="4" fill="#fff" shadow="0 0 10px #fff" />
                <text x="${x + 8}" y="${y + 4}" fill="#d4af37" font-size="9" font-weight="bold">${nom}</text>`;
    });
    document.getElementById('canvas-container').innerHTML = svg + `</svg>`;
}

window.onload = conectarNucleo;
</script>
</body>
</html>
