<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Soporte GXP</title>
    <style>
        body { background: #050505; color: #d4af37; font-family: 'JetBrains Mono', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .support-box { background: #0a0a0a; border: 1px solid #222; padding: 40px; width: 100%; max-width: 500px; box-sizing: border-box; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; margin-bottom: 20px; font-family: inherit; box-sizing: border-box; }
        button { width: 100%; background: #fff; color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:hover { background: #d4af37; }
        h1 { font-size: 1rem; letter-spacing: 4px; text-align: center; border-bottom: 1px solid #222; padding-bottom: 20px; }
    </style>
</head>
<body>

<div class="support-box">
    <h1>CENTRO DE SOPORTE GXP</h1>
    <form id="form-soporte">
        <label style="font-size: 0.6rem; color: #777;">EMAIL DE USUARIO</label>
        <input type="email" id="email" required>

        <label style="font-size: 0.6rem; color: #777;">PLAN</label>
        <select id="plan">
            <option value="SENTINEL">SENTINEL</option>
            <option value="EXECUTIVE">EXECUTIVE</option>
            <option value="GENESIS">GÉNESIS</option>
        </select>

        <label style="font-size: 0.6rem; color: #777;">MENSAJE</label>
        <textarea id="mensaje" rows="4" required></textarea>

        <button type="button" onclick="enviar()">ACTIVAR TICKET</button>
    </form>
    <div id="feedback" style="display:none; margin-top: 20px; text-align: center; font-size: 0.75rem;"></div>
</div>

<script>
    async function enviar() {
        const feedback = document.getElementById('feedback');
        feedback.style.display = "block";
        feedback.innerText = "CONECTANDO CON EL NÚCLEO...";

        const ticketRef = "GX-" + Math.floor(Math.random() * 90000 + 10000);
        const email = document.getElementById('email').value;
        const nombre = email.split('@')[0].toUpperCase();

        // VALORES DE TU CAPTURA Screenshot 2026-03-11 223524.png
        const URL_SB = "https://hfyzgwoivxvzkyfnrlo.supabase.co"; 
        const KEY_SB = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhmeXpnd2pvaXZ4dnpreWZucmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4NTQ4MzAsImV4cCI6MjA4NjQzMDgzMH0.g3h3IJWsSnykuBiDAx9J7AAau9zDcmUUM14e2pezIg8"; // Copia tu Publishable Key completa

        try {
            const res = await fetch(`${URL_SB}/rest/v1/soporte_tickets`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': KEY_SB,
                    'Authorization': `Bearer ${KEY_SB}`,
                    'Prefer': 'return=representation'
                },
                body: JSON.stringify({
                    ticket_ref: ticketRef,
                    nombre_usuario: nombre,
                    email_usuario: email,
                    plan_nivel: document.getElementById('plan').value,
                    mensaje: document.getElementById('mensaje').value,
                    estado: "ABIERTO"
                })
            });

            if(res.ok) {
                feedback.innerText = `TICKET INDEXADO: ${ticketRef}. PROTOCOLO DE AVISO ACTIVADO.`;
                document.getElementById('form-soporte').reset();
            } else {
                feedback.innerText = "ERROR 405/DB: ACCESO DENEGADO POR EL HOST.";
            }
        } catch (err) {
            feedback.innerText = "FALLO CRÍTICO DE SINCRONIZACIÓN.";
        }
    }
</script>
</body>
</html>
