<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Soporte GXP | Vault Logic</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body { background: var(--bg); color: var(--gold); font-family: 'JetBrains Mono', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .support-box { background: #0a0a0a; border: 1px solid #222; padding: 40px; width: 100%; max-width: 500px; box-sizing: border-box; }
        h1 { font-size: 1.1rem; letter-spacing: 4px; text-align: center; border-bottom: 1px solid #222; padding-bottom: 20px; color: #fff; }
        label { font-size: 0.6rem; letter-spacing: 2px; display: block; margin-bottom: 5px; color: #777; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; margin-bottom: 20px; font-family: inherit; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--gold); }
        button { width: 100%; background: #fff; color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: var(--gold); }
        #feedback { display:none; margin-top: 20px; font-size: 0.7rem; text-align: center; border: 1px dashed var(--gold); padding: 10px; }
    </style>
</head>
<body>

<div class="support-box">
    <h1>CENTRO DE SOPORTE</h1>
    <form id="form-soporte">
        <label>EMAIL DE USUARIO</label>
        <input type="email" id="email" required placeholder="ejemplo@correo.com">

        <label>NIVEL DE ACCESO</label>
        <select id="plan">
            <option value="SENTINEL">SENTINEL</option>
            <option value="EXECUTIVE">EXECUTIVE</option>
            <option value="GENESIS">GÉNESIS</option>
        </select>

        <label>DESCRIPCIÓN DEL INCIDENTE</label>
        <textarea id="mensaje" rows="4" required placeholder="Describa el error..."></textarea>

        <button type="button" onclick="ejecutarProtocoloEnvio()">ACTIVAR TICKET</button>
    </form>
    <div id="feedback"></div>
</div>

<script>
    async function ejecutarProtocoloEnvio() {
        const feedback = document.getElementById('feedback');
        const email = document.getElementById('email').value;
        const plan = document.getElementById('plan').value;
        const msg = document.getElementById('mensaje').value;

        if(!email || !msg) return alert("Complete los campos obligatorios.");

        feedback.style.display = "block";
        feedback.innerText = "GENERANDO REFERENCIA GX...";

        const ticketRef = "GX-" + Math.floor(Math.random() * 90000 + 10000);
        const userName = email.split('@')[0].toUpperCase();

        // CREDENCIALES (Usa las de tu captura AstroStrategic)
        const URL_SB = "https://hfyzgwoivxvzkyfnrlo.supabase.co";
        const KEY_SB = "TU_ANON_KEY_AQUI"; 

        try {
            const response = await fetch(`${URL_SB}/rest/v1/soporte_tickets`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': KEY_SB,
                    'Authorization': `Bearer ${KEY_SB}`,
                    'Prefer': 'return=representation' 
                },
                body: JSON.stringify({
                    ticket_ref: ticketRef,
                    nombre_usuario: userName,
                    email_usuario: email,
                    plan_nivel: plan,
                    mensaje: msg,
                    estado: "ABIERTO"
                })
            });

            if(response.ok) {
                feedback.innerText = `TICKET INDEXADO: ${ticketRef}. EL EQUIPO RECIBIRÁ LA NOTIFICACIÓN.`;
                document.getElementById('form-soporte').reset();
            } else {
                throw new Error();
            }
        } catch (err) {
            feedback.innerText = "ERROR 405/CORE: FALLO EN EL ENLACE CON LA BASE DE DATOS.";
        }
    }
</script>
</body>
</html>
