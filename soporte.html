<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vault Logic | Centro de Soporte</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --white: #ffffff; }
        body { background: var(--bg); color: var(--gold); font-family: 'JetBrains Mono', monospace; margin: 0; padding: 60px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .support-container { max-width: 600px; width: 100%; background: rgba(10,10,10,0.9); border: 1px solid #1a1a1a; padding: 40px; box-sizing: border-box; }
        h1 { letter-spacing: 0.5em; font-size: 1.2rem; border-bottom: 1px solid #222; padding-bottom: 20px; text-align: center; color: var(--white); }
        form { display: flex; flex-direction: column; gap: 20px; width: 100%; }
        input, select, textarea { background: #111; border: 1px solid #333; color: #fff; padding: 15px; font-family: inherit; width: 100%; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--gold); }
        .btn-send { background: var(--white); color: #000; border: none; padding: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 3px; }
    </style>
</head>
<body>

<div class="support-container">
    <h1>SOPORTE TÉCNICO GXP</h1>
    <form id="support-form">
        <label style="font-size: 0.7rem; color: #fff; letter-spacing: 2px;">ID DE USUARIO (EMAIL)</label>
        <input type="email" id="user-email" required placeholder="tu-email@dominio.com">
        
        <label style="font-size: 0.7rem; color: #fff; letter-spacing: 2px;">NIVEL DE ACCESO</label>
        <select id="user-plan">
            <option value="SENTINEL">SENTINEL</option>
            <option value="EXECUTIVE">EXECUTIVE</option>
            <option value="GENESIS">GÉNESIS</option>
        </select>

        <label style="font-size: 0.7rem; color: #fff; letter-spacing: 2px;">DESCRIPCIÓN</label>
        <textarea id="user-message" rows="5" required></textarea>

        <button type="button" onclick="enviarTicket()" class="btn-send">ACTIVAR PROTOCOLO</button>
    </form>
    <div id="feedback" style="display:none; margin-top: 20px; text-align: center; border: 1px dashed var(--gold); padding: 15px;"></div>
</div>

<script>
    async function enviarTicket() {
        const feedback = document.getElementById('feedback');
        const email = document.getElementById('user-email').value;
        const plan = document.getElementById('user-plan').value;
        const msg = document.getElementById('user-message').value;

        const ref = "GX-" + Math.floor(Math.random() * 90000 + 10000);
        const nombre = email.split('@')[0].toUpperCase();

        const SUPABASE_URL = "https://hfyzgwoivxvzkyfnrlo.supabase.co";
        const ANON_KEY = "tu_anon_key_aqui";

        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/soporte_tickets`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': ANON_KEY,
                    'Authorization': `Bearer ${ANON_KEY}`
                },
                body: JSON.stringify({ 
                    ticket_ref: ref,
                    nombre_usuario: nombre,
                    email_usuario: email, 
                    plan_nivel: plan, 
                    mensaje: msg 
                })
            });

            if (response.ok) {
                feedback.innerText = `TICKET GENERADO: ${ref}. INCIDENCIA REGISTRADA.`;
                feedback.style.display = "block";
                document.getElementById('support-form').style.display = "none";
            }
        } catch (err) {
            alert("Error de enlace.");
        }
    }
</script>
</body>
</html>
