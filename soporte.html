<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vault Logic | Centro de Soporte</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --white: #ffffff; }
        body { 
            background: var(--bg); color: var(--gold); font-family: 'JetBrains Mono', monospace; 
            margin: 0; padding: 60px 20px; display: flex; flex-direction: column; align-items: center; 
        }
        .support-container { max-width: 600px; width: 100%; background: rgba(10,10,10,0.9); border: 1px solid #1a1a1a; padding: 40px; }
        h1 { letter-spacing: 0.5em; font-size: 1.2rem; border-bottom: 1px solid #222; padding-bottom: 20px; text-align: center; color: var(--white); }
        .info-box { margin-bottom: 30px; font-size: 0.8rem; line-height: 1.8; color: #ccc; }
        .info-box b { color: var(--gold); text-transform: uppercase; }
        
        form { display: flex; flex-direction: column; gap: 20px; }
        label { font-size: 0.6rem; letter-spacing: 2px; color: #555; }
        input, textarea, select { 
            background: transparent; border: 1px solid #333; color: #fff; padding: 12px; 
            font-family: inherit; font-size: 0.8rem; outline: none;
        }
        input:focus, textarea:focus { border-color: var(--gold); }
        .btn-send { 
            background: var(--gold); color: #000; border: none; padding: 15px; 
            font-weight: bold; cursor: pointer; letter-spacing: 3px; margin-top: 10px;
        }
        .btn-send:hover { background: #fff; }
        .back-link { margin-top: 30px; font-size: 0.7rem; color: #444; text-decoration: none; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="support-container">
    <h1>CENTRO DE SOPORTE GXP</h1>
    
    <div class="info-box">
        <b>Estado del Enlace:</b> OPERATIVO<br>
        <b>Tiempo de Respuesta:</b> < 12 HORAS<br>
        Si presenta problemas con la sincronización de su nivel de acceso (Sentinel/Executive/Génesis), envíe este formulario con su ID de transacción.
    </div>

    <form action="https://formspree.io/f/TU_ID_AQUI" method="POST">
        <div>
            <label>ID DE USUARIO (EMAIL)</label><br>
            <input type="email" name="email" required placeholder="admin@ejemplo.com">
        </div>
        
        <div>
            <label>NIVEL DE PROTOCOLO</label><br>
            <select name="tier">
                <option value="sentinel">SENTINEL</option>
                <option value="executive">EXECUTIVE</option>
                <option value="genesis">GÉNESIS</option>
                <option value="tecnico">FALLO TÉCNICO GENERAL</option>
            </select>
        </div>

        <div>
            <label>MENSAJE / CÓDIGO DE ERROR</label><br>
            <textarea name="message" rows="5" required placeholder="Describa la anomalía detectada..."></textarea>
        </div>

        <button type="submit" class="btn-send">ENVIAR INFORME</button>
    </form>
</div>

<a href="suscripcion.html" class="back-link">← REGRESAR A MATRIZ</a>

</body>
</html>
