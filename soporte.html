<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vault Logic | Centro de Soporte</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --white: #ffffff; }
        body { background: var(--bg); color: var(--gold); font-family: 'JetBrains Mono', monospace; margin: 0; padding: 60px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .support-container { max-width: 600px; width: 100%; background: rgba(10,10,10,0.9); border: 1px solid #1a1a1a; padding: 40px; }
        h1 { letter-spacing: 0.5em; font-size: 1.2rem; border-bottom: 1px solid #222; padding-bottom: 20px; text-align: center; color: var(--white); }
        .info-box { margin-bottom: 30px; font-size: 0.8rem; line-height: 1.8; color: #ccc; }
        form { display: flex; flex-direction: column; gap: 20px; }
        label { font-size: 0.7rem; color: #fff; font-weight: bold; letter-spacing: 2px; }
        input, textarea { background: #111; border: 1px solid #333; color: #fff; padding: 12px; font-family: inherit; font-size: 0.9rem; outline: none; }
        input:focus, textarea:focus { border-color: var(--gold); }
        .btn-send { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; letter-spacing: 3px; margin-top: 10px; text-transform: uppercase; transition: 0.3s; }
        .btn-send:hover { background: #fff; }
    </style>
</head>
<body>

<div class="support-container">
    <h1>SOPORTE TÉCNICO GXP</h1>
    <div class="info-box">
        <b>CANAL DE ENLACE:</b> contact@emotionalvaults.com<br>
        Reporte cualquier anomalía en su nivel de acceso. Recibirá una respuesta en su Gmail.
    </div>

    <form action="https://formspree.io/f/mkoqgznz" method="POST">
        <label>TU EMAIL:</label>
        <input type="email" name="email" required placeholder="tu-correo@ejemplo.com">
        
        <label>TU MENSAJE:</label>
        <textarea name="message" rows="5" required placeholder="Describe el inconveniente..."></textarea>

        <button type="submit" class="btn-send">ENVIAR REPORTE</button>
    </form>
</div>

<a href="suscripcion.html" style="margin-top: 30px; color: #444; text-decoration: none; font-size: 0.7rem; letter-spacing: 2px;">← REGRESAR A MATRIZ</a>

</body>
</html>
