<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dossier GX-2026</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; padding: 40px; }
        .page { max-width: 800px; margin: auto; border: 1px solid #222; padding: 40px; }
        .gold { color: #d4af37; }
        .section { margin-top: 30px; border-left: 3px solid #d4af37; padding-left: 15px; }
    </style>
</head>
<body>
    <div class="page">
        <h1>DOSSIER ESTRATÉGICO GX</h1>
        <div class="section">
            OPERADOR: <span id="display-name" class="gold">...</span><br>
            ESTADO: <span id="display-status">...</span>
        </div>
        <div class="section">
            <h3>ANÁLISIS DE CONSULTA</h3>
            <p id="display-range">...</p>
            <p>ROI PROYECTADO: <span id="display-roi" class="gold">...</span></p>
        </div>
    </div>
<script>
    window.onload = function() {
        const name = new URLSearchParams(window.location.search).get('nombre') || "OPERADOR";
        document.getElementById('display-name').innerText = name.toUpperCase();

        const data = JSON.parse(localStorage.getItem('ultimo_reporte'));
        if(data) {
            document.getElementById('display-range').innerText = `RANGO: ${data.rango}`;
            document.getElementById('display-status').innerText = data.estado;
            document.getElementById('display-roi').innerText = data.roi;
        }
    }
</script>
</body>
</html>
